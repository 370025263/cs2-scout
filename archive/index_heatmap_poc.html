<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>de_dust2 Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;font-family:'Segoe UI',-apple-system,sans-serif;color:#ddd;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:18px;font-weight:600;margin-bottom:4px;color:#fff}
#subtitle{font-size:13px;color:#aaa;margin-bottom:12px}
#c{border:1px solid rgba(255,255,255,0.1);border-radius:6px;cursor:crosshair}
#panel{display:flex;gap:24px;align-items:center;margin-top:10px;font-size:13px}
#legend{display:flex;align-items:center;gap:8px}
#legend .bar{width:180px;height:14px;border-radius:7px}
#legend .labels{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:2px}
#controls label{cursor:pointer;margin-right:12px;color:#bbb;font-size:13px}
#controls input{margin-right:4px;accent-color:#d8576b}
</style></head>
<body>
<h1 id="title">de_dust2 — Combat Event Heatmap</h1>
<div id="subtitle">loading data...</div>
<canvas id="c"></canvas>
<div id="panel">
  <div id="legend">
    <span style="font-size:11px;color:#999">Fewer</span>
    <div><div class="bar" id="colorbar"></div><div class="labels"><span></span><span></span></div></div>
    <span style="font-size:11px;color:#999">More</span>
  </div>
  <div id="controls">
    <label><input type="checkbox" id="showMap" checked onchange="draw()">Map</label>
    <label><input type="checkbox" id="showHeat" checked onchange="draw()">Heatmap</label>
    <label><input type="checkbox" id="showLabels" checked onchange="draw()">Labels</label>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mapImg = new Image();
// Set onload BEFORE src to avoid race condition
mapImg.onload = ()=>{if(heatData)draw();};
mapImg.onerror = ()=>{console.warn('Map image failed to load');if(heatData)draw();};
mapImg.src = 'de_dust2_map.png';

const BOMBSITES = [['B', -1430, 2220], ['A', 1560, 2150]];
const SPAWNS = [['T', 500, 2200], ['CT', -1600, -600]];
let heatData = null, maxV = 1;

// ---- Plasma color scale (perceptually uniform) ----
function plasma(t) {
  // matplotlib plasma colormap
  let r,g,b;
  if (t < 0.125) { let s=t/0.125; r=0.05+0.4*s; g=0.03+0.1*s; b=0.53+0.18*s; }
  else if (t < 0.25) { let s=(t-0.125)/0.125; r=0.45+0.18*s; g=0.06+0.2*s; b=0.71-0.07*s; }
  else if (t < 0.375) { let s=(t-0.25)/0.125; r=0.63+0.12*s; g=0.17+0.2*s; b=0.63-0.2*s; }
  else if (t < 0.5) { let s=(t-0.375)/0.125; r=0.74+0.1*s; g=0.33+0.18*s; b=0.42-0.2*s; }
  else if (t < 0.625) { let s=(t-0.5)/0.125; r=0.85+0.07*s; g=0.48+0.14*s; b=0.24-0.1*s; }
  else if (t < 0.75) { let s=(t-0.625)/0.125; r=0.91+0.05*s; g=0.6+0.1*s; b=0.15-0.05*s; }
  else if (t < 0.875) { let s=(t-0.75)/0.125; r=0.96+0.02*s; g=0.7+0.08*s; b=0.1-0.02*s; }
  else { let s=(t-0.875)/0.125; r=0.98+0.02*s; g=0.78+0.1*s; b=0.08+0.05*s; }
  return [Math.min(1,Math.max(0,r))*255|0, Math.min(1,Math.max(0,g))*255|0, Math.min(1,Math.max(0,b))*255|0];
}

// ---- Box blur ----
function boxBlur(data, w, h, r) {
  let s=new Uint8ClampedArray(data.data), d=new Uint8ClampedArray(s.length), ri=r|0;
  for(let y=0;y<h;y++){let sr=0,sg=0,sb=0,sa=0,c=0,rs=y*w*4;for(let x=-ri;x<w;x++){let ax=x+ri,rx=x-ri-1;if(ax<w){let i=rs+ax*4;sr+=s[i];sg+=s[i+1];sb+=s[i+2];sa+=s[i+3];c++}if(rx>=0){let i=rs+rx*4;sr-=s[i];sg-=s[i+1];sb-=s[i+2];sa-=s[i+3];c--}if(x>=0){let i=rs+x*4;d[i]=sr/c;d[i+1]=sg/c;d[i+2]=sb/c;d[i+3]=sa/c}}}
  let t=d;d=new Uint8ClampedArray(s.length);
  for(let x=0;x<w;x++){let sr=0,sg=0,sb=0,sa=0,c=0;for(let y=-ri;y<h;y++){let ay=y+ri,ry=y-ri-1;if(ay<h){let i=ay*w*4+x*4;sr+=t[i];sg+=t[i+1];sb+=t[i+2];sa+=t[i+3];c++}if(ry>=0){let i=ry*w*4+x*4;sr-=t[i];sg-=t[i+1];sb-=t[i+2];sa-=t[i+3];c--}if(y>=0){let i=y*w*4+x*4;d[i]=sr/c;d[i+1]=sg/c;d[i+2]=sb/c;d[i+3]=sa/c}}}
  data.data.set(d);
}

function draw() {
  if (!heatData) return;
  let showMap = document.getElementById('showMap').checked;
  let showHeat = document.getElementById('showHeat').checked;
  let showLabels = document.getElementById('showLabels').checked;

  let cw=1200, ch=1200;
  canvas.width=cw; canvas.height=ch;
  canvas.style.width=Math.min(window.innerWidth-32, cw)+'px';
  canvas.style.height='auto';

  // Compute data-driven bounds
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  heatData.heatmap.forEach(p=>{if(p.x<x0)x0=p.x;if(p.x>x1)x1=p.x;if(p.y<y0)y0=p.y;if(p.y>y1)y1=p.y;});
  let pw=(x1-x0)*0.08,ph=(y1-y0)*0.08; x0-=pw;x1+=pw;y0-=ph;y1+=ph;
  let ww=x1-x0,hh=y1-y0;
  if(ww>hh){let d=(ww-hh)/2;y0-=d;y1+=d}else{let d=(hh-ww)/2;x0-=d;x1+=d}

  let pad=0.06;
  let gx=v=>pad*cw+(v-x0)/(x1-x0)*cw*(1-2*pad);
  let gy=v=>pad*ch+(1-(v-y0)/(y1-y0))*ch*(1-2*pad);

  // ---- Layer 1: Dark background ----
  ctx.fillStyle='#080810'; ctx.fillRect(0,0,cw,ch);

  // ---- Layer 2: Map (dimmed) ----
  if (showMap && mapImg.complete && mapImg.naturalWidth>0) {
    let dx=pad*cw, dy=pad*ch, dw=cw*(1-2*pad), dh=ch*(1-2*pad);
    ctx.drawImage(mapImg, dx, dy, dw, dh);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(dx, dy, dw, dh);
  }

  // ---- Layer 3: Smooth heatmap via offscreen canvas + blur ----
  if (showHeat) {
    let hc=document.createElement('canvas'); hc.width=cw; hc.height=ch;
    let hctx=hc.getContext('2d');

    // Draw white density dots with additive blending
    hctx.globalCompositeOperation='lighter';
    heatData.heatmap.forEach(p=>{
      let t=p.v/maxV, px=gx(p.x), py=gy(p.y);
      let r=12+t*60, alpha=0.12+t*0.4;
      let grad=hctx.createRadialGradient(px,py,0,px,py,r);
      grad.addColorStop(0,`rgba(255,255,255,${alpha})`);
      grad.addColorStop(0.4,`rgba(255,255,255,${alpha*0.5})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      hctx.fillStyle=grad; hctx.beginPath(); hctx.arc(px,py,r,0,Math.PI*2); hctx.fill();
    });

    // Blur density map
    let hd=hctx.getImageData(0,0,cw,ch);
    boxBlur(hd,cw,ch,25);
    boxBlur(hd,cw,ch,25);
    hctx.putImageData(hd,0,0);

    // Color-map using plasma
    let cm=hctx.getImageData(0,0,cw,ch);
    let px=cm.data, maxD=0;
    for(let i=0;i<px.length;i+=4){if(px[i]>maxD)maxD=px[i];}
    if(maxD>0){
      for(let i=0;i<px.length;i+=4){
        let v=px[i]/maxD;
        if(v<0.015){px[i+3]=0;continue;}
        let [cr,cg,cb]=plasma(Math.pow(v,0.8));
        let alpha=Math.min(v*1.0,0.65);
        px[i]=cr; px[i+1]=cg; px[i+2]=cb; px[i+3]=(alpha*255)|0;
      }
    }
    // Stage to a temp canvas so drawImage respects alpha (putImageData would wipe the map layer)
    let tmp=document.createElement('canvas'); tmp.width=cw; tmp.height=ch;
    tmp.getContext('2d').putImageData(cm,0,0);
    ctx.drawImage(tmp,0,0);
  }

  // ---- Layer 4: Map border ----
  let dx=pad*cw, dy=pad*ch, dw=cw*(1-2*pad), dh=ch*(1-2*pad);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2;
  ctx.strokeRect(dx, dy, dw, dh);

  // ---- Layer 5: Labels ----
  if (showLabels) {
    let fontSize = Math.max(20, cw*0.022);
    BOMBSITES.forEach(([lbl,bx,by])=>{
      let px=gx(bx), py=gy(by), r=28;
      ctx.setLineDash([5,5]); ctx.strokeStyle='rgba(255,100,100,0.8)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      // Text with stroke for visibility
      let col = lbl==='A'?'#f44':'#4f4';
      ctx.font=`bold ${fontSize}px "Segoe UI",sans-serif`; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle='#000'; ctx.strokeText(lbl,px,py+fontSize/3);
      ctx.fillStyle=col; ctx.fillText(lbl,px,py+fontSize/3);
    });
    SPAWNS.forEach(([lbl,sx,sy])=>{
      let px=gx(sx), py=gy(sy), col=lbl==='CT'?'#5af':'#f90';
      ctx.font=`bold ${fontSize*0.9}px "Segoe UI",sans-serif`; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle='#000'; ctx.strokeText(lbl,px,py+fontSize/3);
      ctx.fillStyle=col; ctx.fillText(lbl,px,py+fontSize/3);
    });
    // Scale bar in bottom-left
    let[sx,sy]=[gx(x0+400),gy(y0+400)];
    ctx.strokeStyle='#999'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(gx(x0+900),sy); ctx.stroke();
    ctx.fillStyle='#bbb'; ctx.font=`bold ${fontSize*0.75}px "Segoe UI",sans-serif`; ctx.textAlign='left';
    ctx.fillText('500 units',sx+10,sy-6);
  }

  // Draw numerical legend labels
  let step=maxV/4;
  document.querySelector('#legend .labels span:first-child').textContent='0';
  document.querySelector('#legend .labels span:last-child').textContent=maxV;

  // Draw colorbar gradient
  let cb=document.getElementById('colorbar');
  cb.style.background='linear-gradient(to right,'+Array.from({length:20},(_,i)=>'rgb('+plasma(i/19).join(',')+')').join(',')+')';
}

// ---- Load ----

fetch('heatmap_data.json').then(r=>r.json()).then(d=>{
  heatData=d; d.heatmap.forEach(p=>{if(p.v>maxV)maxV=p.v;});
  document.getElementById('subtitle').textContent=
    `${d.heatmap.length} combat events · ${d.total_kills} kills · ${d.total_nades} grenades · max intensity: ${maxV}`;
  draw();
}).catch(e=>{document.getElementById('subtitle').textContent='Error: '+e.message;});

window.addEventListener('resize',draw);
</script></body></html>
